<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSchool Reset Password</title>
    <link rel="stylesheet" href="/reset-password/reset-password.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Poppins, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
        }
        .demo-wrap {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            width: min(520px, 92vw);
            text-align: center;
        }
        .demo-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="demo-wrap">
        <h1>Reset Password Component</h1>
        <p>This is a reusable modal component intended for student and teacher dashboards.</p>
        <button class="demo-btn" id="demo-open">Open Demo Modal</button>
    </div>

    <script src="/reset-password/reset-password.js"></script>
    <script>
        document.getElementById('demo-open').addEventListener('click', function () {
            window.SmartSchoolResetPassword.open({
                token: 'demo',
                toast: function (message) { alert(message); }
            });
        });
    </script>
</body>
</html>

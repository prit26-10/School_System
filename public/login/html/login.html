<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/landing/styles/landing.css">
    <style>
        :root {
            --primary: #0A66FF;
            --primary-dark: #0052cc;
            --light: #ffffff;
            --light-gray: #f8f9fa;
            --dark: #1a1a2e;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --gradient: linear-gradient(135deg, #0A66FF 0%, #1E88E5 100%);
            --shadow: 0 10px 40px rgba(10, 102, 255, 0.15);
            --shadow-sm: 0 4px 15px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 8px;
            --radius-lg: 24px;
            --font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8faff 0%, #e8f4ff 100%) !important;
            background-image: none !important;
            display: block !important;
        }

        .login-page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #f8faff 0%, #e8f4ff 100%);
            position: relative;
            overflow: hidden;
        }

        .login-page-shapes {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .login-page-shapes .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
        }

        .login-page-shapes .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -150px;
            right: -100px;
        }

        .login-page-shapes .shape-2 {
            width: 400px;
            height: 400px;
            background: #1E88E5;
            bottom: -100px;
            left: -100px;
        }

        .login-page-shapes .shape-3 {
            width: 300px;
            height: 300px;
            background: #00C853;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .login-page-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(10, 102, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(30, 136, 229, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-page-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(10, 102, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10, 102, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .login-page-wrapper .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            margin: auto;
        }

        .login-page-wrapper .login-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 40px 32px;
            width: 100%;
            box-sizing: border-box;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .login-logo-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient);
            border-radius: var(--radius-sm);
            color: white;
            font-size: 20px;
            flex-shrink: 0;
        }

        .login-brand-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
        }

        .login-brand-name span {
            color: var(--primary);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            margin: 0 0 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--gray);
            margin: 0;
        }

        .login-form .form-field {
            margin-bottom: 20px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .remember-me label {
            font-size: 14px;
            color: var(--gray);
            cursor: pointer;
            margin: 0;
        }

        .forgot-password {
            font-size: 14px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-form label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .login-form input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            font-family: var(--font-family);
            color: var(--dark);
            background: var(--light-gray);
            border: 1px solid var(--gray-light);
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(10, 102, 255, 0.1);
        }

        .login-form input::placeholder {
            color: var(--gray);
        }

        .password-input-wrapper {
            position: relative;
        }

        .password-input-wrapper input {
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray);
            font-size: 16px;
            padding: 0;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font-family);
            color: white;
            background: var(--gradient);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(10, 102, 255, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--gray);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-page-wrapper .login-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page-wrapper">
        <div class="login-page-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <div class="login-logo-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <div class="login-brand-name">Smart<span>School</span></div>
                </div>
                <div class="login-header">
                    <p class="login-subtitle">Sign in to continue to SmartSchool</p>
                </div>

            <!-- Login Form -->
            <form class="login-form" id="login-form" novalidate>
                <div class="form-field">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" placeholder="Enter your email">
                    <span class="error-message"></span>
                </div>

                <div class="form-field">
                    <label for="login-password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="login-password" name="password" placeholder="Enter your password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="far fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                    <span class="error-message"></span>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember-me" name="remember">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>
    </div>

    <script src="/login/js/auth.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('login-password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('far', 'fa-eye');
                eyeIcon.classList.add('fas', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fas', 'fa-eye-slash');
                eyeIcon.classList.add('far', 'fa-eye');
            }
        }
    </script>
</body>
</html>
